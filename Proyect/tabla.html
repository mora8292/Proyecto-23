<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<script type="text/javascript">
		
		var url = document.location.href;
		var params = url.split('?')[1].split('&');
   		var data = {};
   		var tmp;
   		for (var i = 0; i < params.length; i++) {
       		tmp = params[i].split('=');
       		data[tmp[0]] = tmp[1];
   		}            
   		var x = data.n1;
   		var y = data.n2;
   		var z = data.n3;
   		
   		switch(x)
   		{
   		case "Evento1":
   			y="Auditorio";
   			z="20-04-2023_10:00am";
   			break;
   		case "Evento2":
   			y="Polideportivo";
   			z="30-04-2023_11:00am";
   			break;
   		case "Evento3":
   			y="Auditorio";
   			z="25-04-2023_12:00am";
   			break;
   		case "Evento4":
   			y="Polideportivo";
   			z="30-05-2023_08:00am";
   			break;
   		case "Evento5":
   			y="Auditorio";
   			z="25-05-2023_10:30am";
   			break;

   		}
   		
		$(document.getElementById("detalles")).append('<tr><td>'+x+'</td> <td> '+z+'</td> <td>'+y+' </td></tr>');

	</script>
</head>

</body>
</html>
