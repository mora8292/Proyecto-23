    <script type="text/javascript">
        const   qrfinal = document.querySelector('.qr'), 
        //user_input = document.getElementById('txtUsuario'),
        evento=document.getElementById('Eventos');
    
    function cargar(select){
        
        var n1=evento.value;
        var n2="Auditorio";
        var n3="20-04-2023_10:00am";

        history.pushState({},'',"eventos_Estudiantes.html?n1="+n1+"&n2="+n2+"&n3="+n3);
            $.post("tabla.html",function(res){
                $("#detalles").html(res);
            });
            
        };

        $("#generaQR").click(function(){
            
            if(evento.value != ""){
        if(qrfinal.childElementCount == 0){
          genera(evento);  
        } else { 
          qrfinal.innerHTML = "";          
          genera(evento);
        }
      } else{
        qrfinal.style = "display none";
      }
            function genera(){
                var qrcode = new QRCode(qrfinal, {
                text: `${evento.value} % `,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
                });
            };
        });
    </script>
