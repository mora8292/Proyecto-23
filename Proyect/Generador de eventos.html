<html>
    <head>
        <meta charset="utf-8">
            <link href="css/bootstrap.min.css" rel="stylesheet">
                <link href="estilos.css" rel="stylesheet">
                    <title>
                        Creador de eventos
                    </title>
                </link>
            </link>
        </meta>
    </head>
    <body>
        <div class="container-longer">
            <div class="row">
                <div class="col-lg-3 col-sm-3 imagen">
                    <img class="img img-fluid" height="60px" src="imagenes/itesa.png" width="150px">
                    </img>
                </div>
                <div class="col-lg-6 col-sm-6 sup">
                    <p style="text-align: center; margin-top: 30px; color: white;">
                        INSTITUTO TECNOLÓGICO SUPERIOR DEL ORIENTE DEL ESTADO DE HIDALGO
                    </p>
                </div>
                <div class="col-lg-3 col-sm-3 imagen">
                    <img class="img img-fluid" height="60px" src="imagenes/tec.png" width="150px">
                    </img>
                </div>
                <div class="container" style="width:300px">
                    <div class="row">
                        <div class="col-lg-3 col-sm-3" style="height: 90px;">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-3 col-sm-3 txtEvento">
                            <h3>
                                Evento:
                                <input name="txtEvento" placeholder="Nombre del Evento" style="width:270px" type="text">
                                </input>
                            </h3>
                        </div>
                        <div class="col-lg-10 col-sm-12 txtEvento">
                            <h3>
                                Fecha y Hora:
                                <input name="txtFecha" placeholder="Fecha y Hora" style="width:270px" type="datetime-local">
                                </input>
                            </h3>
                        </div>
                        <div class="col-lg-10 col-sm-12 txtEvento">
                            <h3>
                                Lugar:
                                <select aria-label="Default select example" class="form-select" style="width:270px">
                                    <option value="1">
                                        Polideportivo
                                    </option>
                                    <option value="2">
                                        Auditorio
                                    </option>
                                </select>
                            </h3>
                        </div>
                        <div class="col-lg-12 col-sm-12 txtEvento">
                            <h3>
                                Carreras Asistentes:
                                <select aria-label="Default select example" class="form-select" style="width:270px">
                                    <option value="1">
                                        ISC
                                    </option>
                                    <option value="2">
                                        IIA
                                    </option>
                                    <option value="3">
                                        IE
                                    </option>
                                    <option value="4">
                                        IL
                                    </option>
                                    <option value="5">
                                        IC
                                    </option>
                                    <option value="6">
                                        IM
                                    </option>
                                    <option value="7">
                                        IGE
                                    </option>
                                    <option value="8">
                                        ISA
                                    </option>
                                    <option value="9">
                                        LA
                                    </option>
                                    <option value="10">
                                        LT
                                    </option>
                                    <option value="11">
                                        MSC
                                    </option>
                                    <option value="12">
                                        MCA
                                    </option>
                                </select>
                            </h3>
                        </div>
                        <div class="col-lg-12 col-sm-12 txtEvento">
                            <h3>
                                <br>
                                </br>
                            </h3>
                        </div>
                    </div>
                </div>
                <div class="col-lg-12 col-sm-12 textlogin">
                    <a href="#">
                        <button class="btn_login btn-primary me-md-2 btn" style="padding-left: 2.5rem; padding-right: 2.5rem;" type="button">
                            <img class=" img-fluid" height="25px" src="imagenes/mas.png" width="25px">
                            </img>
                            Generar evento
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </body>
    <footer style="width:100%; margin-left: 0px;">
        <div class="copyright" style="background-color: black;">
            <div class="container-fluid" style="background-color: black; color: #bbdefb;">
                <div class="row">
                    <div class="col-lg-4 col-sm-4" style="text-align:center;">
                        <b>
                            <br>
                                Página Oficial: itesa.edu.mx
                            </br>
                        </b>
                    </div>
                    <div class="col-lg-4 col-sm-4" style="text-align:center;">
                        <b>
                            <br>
                                Teléfono: 01 748-912-4450
                            </br>
                        </b>
                    </div>
                    <div class="col-lg-4 col-sm-4">
                        <center>
                            <img alt="Sample " class="img-fluid" id="img-pie" src="imagenes/hidalgo.png"/>
                        </center>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <style type="text/css">
        html {
  min-height: 100%;
  position: relative;
}
body {
  margin: 0;
  margin-bottom: 200px;
}
footer {
  background-color: black;
  position: absolute;
  bottom: 0;
  width: 100%;
  color: white;
}
    </style>
</html>
